# SonarCloud project configuration
# Docs: https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-parameters/

# --- Project identity (fill these after creating the project on SonarCloud) ---
sonar.organization=tatatitutatuay
sonar.projectKey=tatatitutatuay_mealtion
sonar.projectName=Mealtion

# --- Source code ---
sonar.sources=app/lib
sonar.tests=app/test

# --- Language ---
sonar.language=dart

# --- Exclusions ---
# Generated files, build output, platform-specific code
sonar.exclusions=**/generated/**,**/*.g.dart,**/*.freezed.dart,**/build/**

# --- Duplication ---
sonar.cpd.exclusions=**/*_test.dart

# --- Encoding ---
sonar.sourceEncoding=UTF-8

# --- Coverage ---
sonar.coverage.exclusions=**/generated/**,**/*.g.dart,**/*.freezed.dart,**/main.dart
sonar.dart.lcov.reportPath=app/coverage/lcov.info
